name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # Runtime fetches `data/*.json` and `images/**` relative to the served
      # base. These live at the repo root (not in `public/`, which would bloat
      # dev-server cold starts) so copy them into `dist/` after Vite runs.
      - name: Stage static data + images into dist
        run: |
          cp -r data dist/data
          cp -r images dist/images
          touch dist/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages on first run so the workflow doesn't require a
          # manual Settings → Pages step. Needs `pages: write` perm, which
          # is already granted above.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
